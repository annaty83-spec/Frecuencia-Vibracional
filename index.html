  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #FAF3E0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .container {
    width: 100%;
    max-width: 540px;
  }
  .eyebrow {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: #B8963E;
    font-weight: 700;
    text-align: center;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 28px;
    color: #3D2B1F;
    text-align: center;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .subtitulo {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    color: #C2714F;
    text-align: center;
    margin-bottom: 24px;
  }
  .divider {
    width: 60px;
    height: 2px;
    background: #B8963E;
    margin: 0 auto 24px;
  }
  .parrafo {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 14.5px;
    color: #3D2B1F;
    line-height: 1.65;
    text-align: center;
    margin-bottom: 14px;
  }
  .nota-box {
    display: flex;
    gap: 10px;
    background: #F5EAC0;
    border: 1px solid #B8963E;
    border-radius: 10px;
    padding: 14px 16px;
    margin: 20px 0;
    align-items: flex-start;
  }
  .nota-icono { color: #B8963E; font-size: 15px; flex-shrink: 0; margin-top: 2px; }
  .nota-texto {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #5C4530;
    line-height: 1.55;
  }
  .btn-primario {
    width: 100%;
    background: #C2714F;
    color: #FAF3E0;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.3px;
    transition: background 0.2s;
  }
  .btn-primario:hover { background: #A85C3E; }
  .btn-secundario {
    width: 100%;
    background: transparent;
    color: #C2714F;
    border: 1.5px solid #C2714F;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 600;
    cursor: pointer;
    margin-top: 18px;
    transition: all 0.2s;
  }
  .btn-volver {
    display: block;
    margin: 18px auto 0;
    background: none;
    border: none;
    color: #9C8060;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  .tiempo {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #9C8060;
    text-align: center;
    margin-top: 12px;
  }

  .form-group {
    margin-bottom: 18px;
  }
  .form-label {
    display: block;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #3D2B1F;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #E8DCC0;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Helvetica Neue', sans-serif;
    color: #3D2B1F;
    background: #FAF3E0;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: #B8963E;
  }
  .opciones-marketing {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .opcion-mkt {
    padding: 9px 14px;
    border: 1.5px solid #E8DCC0;
    border-radius: 20px;
    background: #FAF3E0;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    color: #3D2B1F;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opcion-mkt:hover { border-color: #B8963E; background: #F0E4C8; }
  .opcion-mkt.activo { background: #C2714F; border-color: #C2714F; color: #FAF3E0; }

  /* PROGRESO */
  .progreso-wrap { margin-bottom: 26px; }
  .progreso-fondo {
    width: 100%;
    height: 6px;
    background: #E8DCC0;
    border-radius: 3px;
    overflow: hidden;
  }
  .progreso-relleno {
    height: 100%;
    background: linear-gradient(90deg, #C2714F, #B8963E);
    border-radius: 3px;
    transition: width 0.35s ease;
  }
  .progreso-texto {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #9C8060;
    text-align: right;
    margin-top: 5px;
  }
  /* CARD PREGUNTA */
  .pregunta-card {
    background: #fff;
    border-radius: 16px;
    padding: 30px 22px;
    box-shadow: 0 4px 20px rgba(61,43,31,0.09);
  }
  .pregunta-nivel {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: #B8963E;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .pregunta-reflexion {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: #C2714F;
    font-style: italic;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .pregunta-texto {
    font-size: 17px;
    color: #3D2B1F;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .opciones-lista {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .opcion-btn {
    display: flex;
    align-items: center;
    gap: 11px;
    width: 100%;
    text-align: left;
    background: #FAF3E0;
    border: 1.5px solid #E8DCC0;
    border-radius: 10px;
    padding: 12px 15px;
    font-size: 13.5px;
    font-family: 'Helvetica Neue', sans-serif;
    color: #3D2B1F;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opcion-btn:hover { background: #F0E4C8; border-color: #B8963E; }
  .opcion-btn.activo { background: #C2714F; border-color: #C2714F; color: #FAF3E0; }
  .opcion-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(61,43,31,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .opcion-btn.activo .opcion-num { background: rgba(255,255,255,0.25); }
  /* RESULTADO */
  .result-card {
    background: #fff;
    border-radius: 16px;
    padding: 30px 22px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(61,43,31,0.09);
    border: 2px solid;
  }
  .result-nivel { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .result-valor {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px; color: #9C8060; margin-bottom: 20px;
  }
  .barra-fondo {
    position: relative; width: 100%; height: 10px;
    background: #EDE3CC; border-radius: 5px; margin-bottom: 7px;
  }
  .barra-relleno { height: 100%; border-radius: 5px; transition: width 1s ease; }
  .barra-marcador {
    position: absolute; top: -4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 3px solid;
    transform: translateX(-50%);
  }
  .barra-labels {
    display: flex; justify-content: space-between;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px; color: #9C8060; margin-bottom: 18px;
  }
  .result-desc {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13.5px; color: #3D2B1F; line-height: 1.6; margin-bottom: 10px;
  }
  .result-invitacion {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px; color: #C2714F; line-height: 1.5; font-style: italic;
  }
  .seccion-titulo {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px; letter-spacing: 1px;
    color: #9C8060; font-weight: 700;
    text-transform: uppercase;
    margin: 26px 0 12px 4px;
  }
  /* RANKING */
  .ranking-lista { display: flex; flex-direction: column; gap: 10px; }
  .ranking-item {
    display: flex; align-items: center; gap: 11px;
    background: #fff; border-radius: 10px; padding: 11px 14px;
  }
  .ranking-num {
    width: 26px; height: 26px; border-radius: 50%;
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .ranking-nombre {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px; color: #3D2B1F; font-weight: 600; margin-bottom: 5px;
  }
  .ranking-bar-fondo { width: 100%; height: 5px; background: #EDE3CC; border-radius: 3px; }
  .ranking-bar-relleno { height: 100%; border-radius: 3px; }
  /* CTA FINAL */
  .cta-final {
    background: #3D2B1F;
    border-radius: 14px;
    padding: 0;
    margin-top: 26px;
    overflow: hidden;
  }
  .cta-foto {
    width: 100%;
    height: 400px;
    object-fit: cover;
    object-position: center 52%;
    display: block;
  }
  .cta-contenido { padding: 22px 22px 26px; text-align: center; }
  .cta-titulo {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 15px; color: #FAF3E0; font-weight: 600; margin-bottom: 8px;
  }
  .cta-subtexto {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px; color: #D9C9A8; line-height: 1.55;
  }
  .cta-subtexto strong { color: #B8963E; }
  .logo-portada {
    display: block;
    width: 120px;
    margin: 0 auto 16px;
  }

  /* LOGIN */
  .login-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #2F4030;
    display: flex;

    max-width: 360px;

  .login-label {
    font-family: 'Helvetica Neue', sans-serif;

    font-weight: 600;
    color: #3D2B1F;
    margin-bottom: 10px;

  .login-input {

    padding: 14px 16px;

    font-family: 'Helvetica Neue', sans-serif;
    color: #3D2B1F;
    background: #FBF1E2;

    text-align: center;
    letter-spacing: 8px;
    outline: none;
    margin-bottom: 16px;
  }
  .login-input:focus { border-color: #B8963E; }
  .login-btn {
    width: 100%;
    background: #2F4030;
    color: #FAF3E0;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 600;
    cursor: pointer;
  }
  .login-btn:active { background: #4A5D44; }
  .login-error {
    font-family: 'Helvetica Neue', sans-serif;

  }

      class="login-input" id="login-input"

<script>
function verificarCodigo() {
  const input = document.getElementById('login-input').value.trim();
  const error = document.getElementById('login-error');
  if (input === '1111') {
    const overlay = document.getElementById('login-overlay');
    overlay.style.transition = 'opacity 0.5s ease';
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.style.display = 'none';
      // Save access in session
      sessionStorage.setItem('acceso', '1');
    }, 500);
  } else {
    error.style.display = 'block';
    document.getElementById('login-input').value = '';
    document.getElementById('login-input').focus();
    setTimeout(() => error.style.display = 'none', 3000);
  }
}

// Check if already logged in this session
if (sessionStorage.getItem('acceso') === '1') {
  document.getElementById('login-overlay').style.display = 'none';
}

// Allow Enter key
document.addEventListener('DOMContentLoaded', function() {
  const inp = document.getElementById('login-input');
  if (inp) {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verificarCodigo();

let paso = -2;

function calcularNivel() {
  const porNivel = {};
  PREGUNTAS.forEach(p => {
    if (!porNivel[p.nivel]) porNivel[p.nivel] = { suma:0, cant:0, valor:p.valor };
    porNivel[p.nivel].suma += respuestas[p.id] || 0;
    porNivel[p.nivel].cant++;
  });

  // Ponderación: cada nivel contribuye según el PROMEDIO de sus respuestas
  // Para mayor precisión: si alguien responde alto en niveles bajos Y altos,
  // el nivel dominante pesa más
  let num = 0, den = 0;
  Object.values(porNivel).forEach(n => {
    const avg = n.suma / n.cant; // 1-5
    // Peso cuadrático para amplificar diferencias
    const peso = avg * avg;
    num += n.valor * peso;
    den += peso;
  });

  const freq = den > 0 ? num / den : 200;

  // Nivel más cercano
  let nivelFinal = NIVELES_INFO[0];
  let minDist = Infinity;
  NIVELES_INFO.forEach(n => {
    const d = Math.abs(n.valor - freq);
    if (d < minDist) { minDist = d; nivelFinal = n; }
  });

  // Top 3 niveles con mayor promedio
  const ranking = Object.entries(porNivel)
    .map(([nombre, v]) => ({ nombre, promedio: v.suma / v.cant }))
    .sort((a,b) => b.promedio - a.promedio)
    .slice(0,3);

  return { freq: Math.round(freq), nivel: nivelFinal, ranking, porNivel };
}

        const info = NIVELES_INFO.find(n => n.nombre === r.nombre);
        const w = Math.round((r.promedio / 5) * 100);
        return `
          <div class="ranking-item">
            <div class="ranking-num" style="background:${info ? info.color : '#C2714F'}">${i+1}</div>
            <div style="flex:1">
              <div class="ranking-nombre">${r.nombre}</div>
              <div class="ranking-bar-fondo">
                <div class="ranking-bar-relleno" style="width:${w}%; background:${info ? info.color : '#C2714F'}"></div>
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>

    <div class="nota-box" style="margin-top:22px">
      <span class="nota-icono">✦</span>
      <p class="nota-texto">*Esta herramienta está inspirada en la Escala de Conciencia del Dr. David R. Hawkins y es un recurso de autoconocimiento, no una medición científica validada. Usala como punto de partida para una conversación más profunda sobre tu proceso.</p>
    </div>

    <div class="cta-final">
      <img src="${FOTO_B64}" class="cta-foto" alt="Diego y Andrea">
      <div class="cta-contenido">
        <p class="cta-titulo">¿Querés trabajar este nivel en profundidad?</p>
        <p class="cta-subtexto">En <strong>RAÍCES</strong> acompañamos tu proceso de sanación desde el origen, con herramientas reales que se instalan en el cuerpo, el linaje y el alma.</p>
      </div>
    </div>

    <button class="btn-secundario" onclick="reiniciar()">Volver a hacer el test</button>
  `;
}

function reiniciar() { paso = -1; respuestas = {}; render(); window.scrollTo(0,0); }

render();
</script>

<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // Inline service worker
    const swContent = `
      const CACHE = 'frecuencia-v1';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(c => c.addAll(['/']))
        );
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request))
        );
      });
    `;
    const blob = new Blob([swContent], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url)
      .then(() => console.log('SW registrado'))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
